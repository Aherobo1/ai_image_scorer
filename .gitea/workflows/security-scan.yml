name: Security Scan

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit

      - name: Run Bandit security linter
        run: |
          bandit -r . -x ./test,./venv,./.venv -f json -o bandit-report.json || true
          bandit -r . -x ./test,./venv,./.venv

      - name: Check for known vulnerabilities
        run: |
          if [ -f requirements.txt ]; then
            safety check -r requirements.txt --full-report || true
          fi

      - name: Scan for secrets
        run: |
          echo "Scanning for potential secrets..."
          grep -rn --include="*.py" -E "(api_key|secret|password|token)\s*=\s*['\"][^'\"]+['\"]" . || echo "No hardcoded secrets found in Python files"

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt || true
          fi